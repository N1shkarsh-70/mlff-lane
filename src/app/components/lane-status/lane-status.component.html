<section class="lane-status-section">
  <span class="section-title">Lane Status</span>
  <div class="status-chips">
    @for (device of devices(); track device.id) {
      <div class="status-chip">
        <div class="chip-icon">
          @switch (device.type) {
            @case ('rfid') {
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10s3-3 5-3 5 3 5 3-3 3-5 3-5-3-5-3Z"/><path d="M14 10s3-3 5-3 5 3 5 3-3 3-5 3-5-3-5-3Z"/><circle cx="12" cy="14" r="2"/></svg>
            }
            @case ('anpr-front') {
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            }
            @case ('anpr-back') {
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            }
            @case ('radar-4d') {
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07"/><path d="M16.24 7.76A6 6 0 0 0 7.76 16.24"/><circle cx="12" cy="12" r="2"/></svg>
            }
            @case ('lidar-3d') {
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="8"/><path d="M12 2v4"/><path d="M12 18v4"/></svg>
            }
          }
        </div>
        <div class="chip-info">
          <span class="chip-name">{{ device.name }}</span>
          <span class="chip-status" [class.active]="device.status === 'active'">
            {{ device.status === 'active' ? 'Active' : 'Inactive' }}
            <span class="chip-dot" [class.active]="device.status === 'active'"></span>
          </span>
        </div>
      </div>
    }
  </div>
</section>
